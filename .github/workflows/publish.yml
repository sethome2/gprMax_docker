name: Build and publish Docker images

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sethome2/gprmax-docker
  GPRMAX_VERSION: 3.1.7
  GPRMAX_TAG: v.3.1.7

jobs:
  build-cpu:
    name: Build CPU image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CPU image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cpu
          load: true
          tags: local/gprmax:${{ env.GPRMAX_VERSION }}-cpu
          build-args: |
            GPRMAX_VERSION=${{ env.GPRMAX_VERSION }}
            GPRMAX_TAG=${{ env.GPRMAX_TAG }}

      - name: Smoke test CPU image
        run: docker run --rm local/gprmax:${{ env.GPRMAX_VERSION }}-cpu --help

      - name: Publish CPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cpu
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.GPRMAX_VERSION }}-cpu
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-cpu
          build-args: |
            GPRMAX_VERSION=${{ env.GPRMAX_VERSION }}
            GPRMAX_TAG=${{ env.GPRMAX_TAG }}

  build-gpu:
    name: Build GPU image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish GPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gpu
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.GPRMAX_VERSION }}-gpu
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-gpu
          build-args: |
            GPRMAX_VERSION=${{ env.GPRMAX_VERSION }}
            GPRMAX_TAG=${{ env.GPRMAX_TAG }}
            CUDA_VERSION=12.4.1
